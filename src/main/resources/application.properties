spring.application.name=gestionacademica

# --- CONECTION A MYSQL ---
spring.datasource.url= ${DB_URL: jdbc:mysql://localhost:3306/gestion_academica?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURATION DE JPA / HIBERNATE ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.ddl-auto=validate

# Dialecto de MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- PUERTO DEL SERVIDOR ---
server.port=${PORT:8080}
